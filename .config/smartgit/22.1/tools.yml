tools:
- id: openFile
  name: Open File
  fileStarter: {command: /usr/bin/gio, parameters: 'open ${filePath}'}
  useForOpen: true
  waitUntilFinished: false
  filePattern: '*'
  forFilesNotDirectories: true
- id: revealInDbusSend
  name: Reveal in File Manager
  fileStarter: {command: /usr/bin/dbus-send, parameters: '--type=method_call --dest=org.freedesktop.FileManager1
      /org/freedesktop/FileManager1 org.freedesktop.FileManager1.ShowItems array:string:"${fileUri}"
      string:""'}
  useForOpen: true
  waitUntilFinished: false
  filePattern: '*'
- id: revealInNemo
  name: Reveal in Nemo
  fileStarter: {command: /usr/bin/nemo, parameters: '${fileUri}'}
  useForOpen: true
  waitUntilFinished: false
  filePattern: '*'
- id: openGnomeTerminal
  name: Open Terminal
  fileStarter: {command: /usr/bin/gnome-terminal, parameters: '--working-directory
      ${filePath}'}
  useForOpen: true
  waitUntilFinished: false
  filePattern: '*'
  forFilesNotDirectories: false
- id: applyPatch
  name: Apply Patch
  fileStarter: {command: '${git}', parameters: 'apply ${fileOpen}'}
  useForOpen: false
  waitUntilFinished: true
  filePattern: '*'
- id: verifyDatabase
  name: Verify Database
  fileStarter: {command: '${git}', parameters: fsck --full --no-progress}
  useForOpen: false
  waitUntilFinished: true
  filePattern: '*'
- id: mergeDirectlyTo
  name: Merge Directly To
  fileStarter: {command: /usr/bin/python3, parameters: '"${smartGitDir}/lib/git-forward-merge.sh"
      ${commit} ${commit2}'}
  useForOpen: false
  waitUntilFinished: true
  filePattern: '*'
  forRefsNotShas: true
  requiresConfirmation: true
  confirmationMessage: Do you want to merge changes to ${commit2} *without* checking
    out?
- name: Open in Terminal
  fileStarter: {command: terminator, parameters: '--maximise --working-directory ${filePath}'}
  useForOpen: false
  waitUntilFinished: false
  filePattern: '*'
- name: Open with File Manager (thunar)
  fileStarter: {command: thunar, parameters: '${filePath}'}
  useForOpen: false
  waitUntilFinished: false
  filePattern: '*'
  forFilesNotDirectories: false
- name: Delete Directory
  fileStarter: {command: rm, parameters: '-rf ${filePath}'}
  useForOpen: true
  waitUntilFinished: false
  filePattern: '*'
- name: Open with File Manager (nemo)
  fileStarter: {command: nemo, parameters: '${filePath}'}
  useForOpen: false
  waitUntilFinished: false
  filePattern: '*'
  forFilesNotDirectories: false
- id: gitConfigList
  name: Git Config
  fileStarter: {command: '${git}', parameters: config --list --show-origin}
  useForOpen: false
  waitUntilFinished: true
  filePattern: '*'
- name: Open File
  fileStarter: {command: /usr/bin/xdg-open, parameters: '${filePath}'}
  useForOpen: true
  waitUntilFinished: false
  filePattern: '*'
  forFilesNotDirectories: true
- id: revealInNemo
  name: Reveal in Nemo
  fileStarter: {command: /usr/bin/nemo, parameters: '${fileUri}'}
  useForOpen: true
  waitUntilFinished: false
  filePattern: '*'
- id: openXfceTerminal
  name: Open Terminal
  fileStarter: {command: /usr/bin/xfce4-terminal, parameters: '--working-directory
      ${filePath}'}
  useForOpen: true
  waitUntilFinished: false
  filePattern: '*'
  forFilesNotDirectories: false
- id: revealInNautilus
  name: Reveal in Files (Nautilus)
  fileStarter: {command: /usr/bin/nautilus, parameters: '${fileUri}'}
  useForOpen: true
  waitUntilFinished: false
  filePattern: '*'
- id: openGnomeTerminal
  name: Open Terminal
  fileStarter: {command: /usr/bin/gnome-terminal, parameters: '--working-directory
      ${filePath}'}
  useForOpen: true
  waitUntilFinished: false
  filePattern: '*'
  forFilesNotDirectories: false
- name: Create Patch (save file)
  fileStarter: {command: bash, parameters: '-c "git format-patch --stdout ${commit}..${commit2}
      > \"${fileSave}\""'}
  useForOpen: false
  waitUntilFinished: true
  filePattern: '*'
  forRefsNotShas: false
- name: Format Patch
  fileStarter: {command: '${git}', parameters: 'format-patch -o "${dirSelect}" -1
      ${commit}'}
  useForOpen: false
  waitUntilFinished: true
  filePattern: '*'
- name: Show Staged Diff
  fileStarter: {command: '${git}', parameters: diff --cached}
  useForOpen: false
  waitUntilFinished: true
  filePattern: '*'
- name: Commit Staged with aicommits
  fileStarter: {command: xfce4-terminal, parameters: --maximize --command "bash -c
      'oco; echo Done - press Enter to close; read'"}
  useForOpen: false
  waitUntilFinished: false
  filePattern: '*'
manuallyDeletedIds: []
